name: loanerist
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=2.19.6 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^4.4.2
  firebase_core: ^2.10.0
  fluttertoast: ^8.2.1
  google_fonts: ^4.0.4
  flutter_settings_screens: ^0.3.3-null-safety+2
  cloud_firestore: ^4.6.0
  awesome_snackbar_content: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/forgot-password.jpg
    - assets/images/login.jpg
    - assets/images/otp.jpg
    - assets/images/reset-password.jpg
    - assets/images/signup.jpg
  fonts:
    - family: GilroyLight
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Light.ttf
    - family: GilroyRegular
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Regular.ttf
    - family: GilroyMedium
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Medium.ttf
    - family: GilroyHeavy
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Heavy.ttf
    - family: GilroySemiBold
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-SemiBold.ttf
    - family: GilroyBold
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Bold.ttf
    - family: GilroyExtraBold
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-ExtraBold.ttf
    - family: GilroyBlack
      fonts:
        - asset: assets/fonts/Gilroy/Gilroy-Black.ttf
